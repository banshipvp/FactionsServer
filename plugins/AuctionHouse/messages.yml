# ===============================================
# PLACEHOLDERS REFERENCE
# ===============================================
# {prefix} - Configured prefix
# {player} - Player name
# {server} - Server name
# {item} - Item name
# {amount} - Item amount
# {price} - Price value
# {currency} - Currency symbol
# {tax} - Tax amount
# {current} - Current count
# {max} - Maximum count
# {buyer} - Buyer name
# {seller} - Seller name
# {rank} - Rank name
# {count} - Generic count
# {url} - Web URL
# {code} - Verification code
# {minutes} - Time in minutes
# {status} - Status text
# {port} - Port number
# {inventory} - Inventory count
# {dropped} - Dropped count